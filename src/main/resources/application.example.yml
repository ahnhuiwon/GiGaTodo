spring:
    application:
        name: todoapp

    datasource:
        url: jdbc:postgresql://localhost:13000/todo-app
        username: todo
        password: your-password
        driver-class-name: org.postgresql.Driver
    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: google-client-id
                        client-secret: google-secret-id
                        scope:
                            - email
                            - profile
                    kakao:
                        client-id: kakao-client-id
                        client-secret: kakao-secret-id
                        client-authentication-method: client_secret_post
                        authorization-grant-type: authorization_code
                        redirect-uri: http://localhost:8080/login/oauth2/code/kakao
                        scope:
                            - profile_nickname
                    naver:
                        client-id: naver-client-id
                        client-secret: naver-secret-id
                        client-authentication-method: client_secret_post
                        authorization-grant-type: authorization_code
                        redirect-uri: http://localhost:8080/login/oauth2/code/naver
                        scope:
                            - name
                            - email
                            - nickname
                provider:
                    kakao:
                        authorization-uri: https://kauth.kakao.com/oauth/authorize
                        token-uri: https://kauth.kakao.com/oauth/token
                        user-info-uri: https://kapi.kakao.com/v2/user/me
                        user-name-attribute: id
                    naver:
                        authorization-uri: https://nid.naver.com/oauth2.0/authorize
                        token-uri: https://nid.naver.com/oauth2.0/token
                        user-info-uri: https://openapi.naver.com/v1/nid/me
                        user-name-attribute: response

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true
jwt:
  secret: your-jwt-secret-key-must-be-at-least-32-characters-long
  validity-ms: 3600000   # 1시간 (밀리초)